

      

      
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    textarea {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
      resize: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      font-size: 16px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(34,197,94,0.4);
    }

    .result {
      margin-top: 20px;
      padding: 18px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }

    .bullish {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
    }

    .bearish {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
    }

    .neutral {
      background: rgba(148,163,184,0.15);
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Investment Analyzer</h1>
  <p>Turn financial news into instant market signals</p>

  <div class="card">
    <textarea id="text" rows="5" placeholder="Paste financial news here..."></textarea>

    <button id="btn" onclick="analyze()">Analyze</button>

    <div id="result" class="result"></div>
  </div>

</div>

<script>
async function analyze() {
  const text = document.getElementById("text").value;
  const btn = document.getElementById("btn");
  const resultDiv = document.getElementById("result");

  if (!text.trim()) return;

  btn.innerText = "Analyzing...";
  btn.disabled = true;

  const res = await fetch("http://127.0.0.1:8000/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text: text })
  });

  const data = await res.json();

  btn.innerText = "Analyze";
  btn.disabled = false;

  resultDiv.style.display = "block";

  if (data.prediction.includes("Bullish")) {
    resultDiv.className = "result bullish";
  } else if (data.prediction.includes("Bearish")) {
    resultDiv.className = "result bearish";
  } else {
    resultDiv.className = "result neutral";
  }

  resultDiv.innerText = data.prediction + " (" + data.confidence + "%)";
}
</script>

</body>
</html>
